openapi: 3.1.0
info:
  title: Axon Server REST Applications Events API
  description: The Axon Server REST API provides HTTP endpoints for managing the Axon Server event store, command routing, query handling, application contexts, users, and cluster configuration.
  version: 4.9.0
  contact:
    name: AxonIQ
    url: https://www.axoniq.io/
  license:
    name: AxonIQ Open Source License
    url: https://www.axoniq.io/
servers:
- url: '{baseUrl}/v1'
  description: Axon Server
  variables:
    baseUrl:
      default: http://localhost:8024
tags:
- name: Events
paths:
  /events:
    get:
      operationId: listEvents
      summary: Axon Framework - List Events
      description: Returns events from the event store with optional filtering.
      tags:
      - Events
      parameters:
      - name: context
        in: query
        schema:
          type: string
      - name: trackingToken
        in: query
        schema:
          type: integer
          format: int64
      - name: numberOfEvents
        in: query
        schema:
          type: integer
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Event'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    post:
      operationId: appendEvent
      summary: Axon Framework - Append an Event
      description: Appends a new event to the event store.
      tags:
      - Events
      parameters:
      - name: context
        in: query
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Event'
      responses:
        '200':
          description: Event appended
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /events/aggregates/{aggregateId}:
    get:
      operationId: getAggregateEvents
      summary: Axon Framework - Get Events for an Aggregate
      description: Returns all events for a specific aggregate.
      tags:
      - Events
      parameters:
      - name: aggregateId
        in: path
        required: true
        schema:
          type: string
      - name: context
        in: query
        schema:
          type: string
      - name: initialSequence
        in: query
        schema:
          type: integer
          format: int64
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Event'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
components:
  schemas:
    Event:
      type: object
      properties:
        messageIdentifier:
          type: string
        aggregateIdentifier:
          type: string
        aggregateSequenceNumber:
          type: integer
          format: int64
        aggregateType:
          type: string
        timestamp:
          type: integer
          format: int64
        payloadType:
          type: string
        payloadRevision:
          type: string
        payloadData:
          type: string
        metaData:
          type: object
