naftiko: 1.0.0-alpha2
info:
  label: Axon Server REST API — Commands
  description: 'Axon Server REST API — Commands. 1 operations. Lead operation: Axon Framework - List Command Handlers. Self-contained
    Naftiko capability covering one Axon Framework business surface.'
  tags:
  - Axon Framework
  - Commands
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AXON_FRAMEWORK_API_KEY: AXON_FRAMEWORK_API_KEY
capability:
  consumes:
  - type: http
    namespace: axon-server-commands
    baseUri: ''
    description: Axon Server REST API — Commands business capability. Self-contained, no shared references.
    resources:
    - name: commands
      path: /commands
      operations:
      - name: listcommandhandlers
        method: GET
        description: Axon Framework - List Command Handlers
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: context
          in: query
          type: string
  exposes:
  - type: rest
    namespace: axon-server-commands-rest
    port: 8080
    description: REST adapter for Axon Server REST API — Commands. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/commands
      name: commands
      description: REST surface for commands.
      operations:
      - method: GET
        name: listcommandhandlers
        description: Axon Framework - List Command Handlers
        call: axon-server-commands.listcommandhandlers
        with:
          context: rest.context
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: axon-server-commands-mcp
    port: 9090
    transport: http
    description: MCP adapter for Axon Server REST API — Commands. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: axon-framework-list-command-handlers
      description: Axon Framework - List Command Handlers
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: axon-server-commands.listcommandhandlers
      with:
        context: tools.context
      outputParameters:
      - type: object
        mapping: $.
