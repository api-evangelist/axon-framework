  description: 'Axon Server REST API — Queries. 1 operations. Lead operation: Axon Framework - List Query Handlers. Self-contained
    Naftiko capability covering one Axon Framework business surface.'
  tags:
  - Axon Framework
  - Queries
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AXON_FRAMEWORK_API_KEY: AXON_FRAMEWORK_API_KEY
capability:
  consumes:
  - type: http
    namespace: axon-server-queries
    baseUri: ''
    description: Axon Server REST API — Queries business capability. Self-contained, no shared references.
    resources:
    - name: queries
      path: /queries
      operations:
      - name: listqueryhandlers
        method: GET
        description: Axon Framework - List Query Handlers
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: context
          in: query
          type: string
  exposes:
  - type: rest
    namespace: axon-server-queries-rest
    port: 8080
    description: REST adapter for Axon Server REST API — Queries. One Spectral-compliant resource per consumed operation,
