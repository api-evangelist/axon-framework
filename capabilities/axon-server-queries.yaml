    resources:
    - path: /v1/queries
      name: queries
      description: REST surface for queries.
      operations:
      - method: GET
        name: listqueryhandlers
        description: Axon Framework - List Query Handlers
        call: axon-server-queries.listqueryhandlers
        with:
          context: rest.context
        outputParameters:
        - type: object
          mapping: $.
